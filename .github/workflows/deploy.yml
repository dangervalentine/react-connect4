name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Required for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. Don't cancel an in-flight production
# deploy if a new commit lands while it's running.
concurrency:
  group: pages
  cancel-in-progress: false

# Opt JS-based actions (checkout, setup-node, deploy-pages, ...) into the
# Node 24 runtime ahead of GitHub's June 2, 2026 cutover. Remove this once
# we're on action majors that ship with Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: npm  # re-enable once a package-lock.json is committed

      # Use `npm install` until a lockfile is committed; switch to `npm ci` after.
      - run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
